name: Changed Files
description: Produce lists of modified files
inputs:
  base:
    description: Base commit SHA or ref
    required: true
    type: string
  head:
    description: Head commit SHA or ref
    required: true
    type: string
outputs:
  result:
    description: |
      Structured json object with following properties:
      - added: Files added
      - modified: Files modified
      - renamed: Files renamed
      - deleted: Files deleted
      - simple_add: All files that are either modified, added or renamed (new file name)
      - simple_delete: All files that are either deleted or renamed (old file name)
    value: ${{ steps.check.outputs.result }}
runs:
  using: composite
  steps:
    - name: Check file changes between commits
      id: check
      shell: bash
      run: |
        base="${{ inputs.base }}"
        head="${{ inputs.head }}"

        # Get all changed files with their status
        git diff --name-status "$base...$head" > /tmp/diff_output.txt

        added=()
        modified=()
        renamed_json="{}"
        deleted=()
        simple_add=()
        simple_delete=()

        while IFS=$'\t' read -r status old_file new_file; do
          case "$status" in
            A)
              added+=("$old_file")
              simple_add+=("$old_file")
              ;;
            M)
              modified+=("$old_file")
              simple_add+=("$old_file")
              ;;
            D)
              deleted+=("$old_file")
              simple_delete+=("$old_file")
              ;;
            R*)
              # Renamed: old_file is old name, new_file is new name
              renamed_json=$(echo "$renamed_json" | jq --arg old "$old_file" --arg new "$new_file" '.[$old] = $new')
              simple_add+=("$new_file")
              simple_delete+=("$old_file")
              ;;
          esac
        done < /tmp/diff_output.txt

        # Build JSON output using jq to handle array formatting
        result=$(jq -n \
          --argjson added "$(printf '%s\n' "${added[@]}" | jq -Rs 'split("\n") | map(select(length > 0))')" \
          --argjson modified "$(printf '%s\n' "${modified[@]}" | jq -Rs 'split("\n") | map(select(length > 0))')" \
          --argjson renamed "$renamed_json" \
          --argjson deleted "$(printf '%s\n' "${deleted[@]}" | jq -Rs 'split("\n") | map(select(length > 0))')" \
          --argjson simple_add "$(printf '%s\n' "${simple_add[@]}" | jq -Rs 'split("\n") | map(select(length > 0))')" \
          --argjson simple_delete "$(printf '%s\n' "${simple_delete[@]}" | jq -Rs 'split("\n") | map(select(length > 0))')" \
          '{
            added: $added,
            modified: $modified,
            renamed: $renamed,
            deleted: $deleted,
            simple_add: $simple_add,
            simple_delete: $simple_delete
          }')

        # Output result using heredoc format for multi-line JSON
        {
          echo "result<<EOF"
          echo "$result"
          echo "EOF"
        } >> $GITHUB_OUTPUT
        
        echo "$result" | jq '.'
